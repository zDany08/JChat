plugins {
    id 'java'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    implementation 'org.json:json:20240303'
}

jar {
    manifest {
        attributes(
                'Main-Class': 'me.zdany.jchat.Main'
        )
    }
}

test {
    useJUnitPlatform()
}